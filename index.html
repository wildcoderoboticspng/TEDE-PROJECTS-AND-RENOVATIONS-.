<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tede Projects & Renovations</title>
    <style>
        /* --- General Styles --- */
        body {
            background-color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            color: #222;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* --- Logo & Header --- */
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-container img {
            max-width: 300px;
            height: auto;
        }

        h2 {
            color: red;
            text-align: center;
            margin: 40px 0 20px;
            text-transform: uppercase;
        }

        h3 {
            color: blue;
            border-left: 5px solid red;
            padding-left: 10px;
            margin-top: 30px;
            text-transform: uppercase;
        }

        h4 {
            color: #444;
            text-align: center;
            margin-bottom: 40px;
        }

        /* --- Project Gallery --- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .gallery-item {
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #ddd;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .gallery-item:hover {
            transform: scale(1.02);
        }

        .gallery-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }

        hr { border: 1px solid red; margin: 30px 0; }
